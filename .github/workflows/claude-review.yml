name: Claude Code Review

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this pull request for code quality, correctness, and security.
            Focus on:
            - Bugs or edge cases (null handling, async issues, boundary conditions)
            - Security issues (XSS, injection, unvalidated inputs, exposed secrets)
            - Performance concerns (unnecessary re-renders, heavy computations)
            - TypeScript correctness and type safety
            - Tailwind/React best practices for Next.js projects
            Post your findings as inline review comments on the relevant lines.
          claude_args: "--max-turns 5"
